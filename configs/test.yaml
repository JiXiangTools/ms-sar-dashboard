app:
  name: ms-sar-dashboard
  env: test
  host: 127.0.0.1
  port: 18081
  read_timeout: 5s
  write_timeout: 10s
  shutdown_timeout: 10s

auth:
  jwt_secret: ms-sar-dashboard-test-secret
  access_token_ttl: 2h
  issuer: ms-sar-dashboard

log:
  level: debug

database:
  dsn: postgres://postgres:postgres@127.0.0.1:5432/ms_sar_dashboard_test?sslmode=disable
  max_open_conns: 20
  max_idle_conns: 5
  conn_max_lifetime: 30m
  health_check_timeout: 2s

redis:
  mode: standalone
  addrs:
    - 127.0.0.1:6379
  key_prefix: ""
  db: 1
  dial_timeout: 2s
  read_timeout: 2s
  write_timeout: 2s
  health_check_timeout: 2s

elasticsearch:
  addrs:
    - http://127.0.0.1:9200
  product_index_prefix: ms_search_product
  request_timeout: 5s
  max_response_bytes: 4194304
  debug_enabled: true

recommend_debug:
  max_candidate_limit: 1000
  debug_enabled: true
  online_base_url: http://127.0.0.1:18082
  request_timeout: 5s
