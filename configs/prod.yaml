app:
  name: ms-sar-dashboard
  env: prod
  host: 0.0.0.0
  port: 8081
  read_timeout: 5s
  write_timeout: 10s
  shutdown_timeout: 15s

auth:
  jwt_secret: ""
  access_token_ttl: 2h
  issuer: ms-sar-dashboard

sso:
  enabled: false
  admin_ui_url: ""
  api_base_url: ""
  app_id: ""
  app_secret: ""
  redirect_url: ""
  request_timeout: 3s

log:
  level: info

database:
  dsn: ""
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime: 30m
  health_check_timeout: 2s

redis:
  mode: standalone
  addrs: []
  key_prefix: ""
  db: 0
  dial_timeout: 2s
  read_timeout: 2s
  write_timeout: 2s
  health_check_timeout: 2s

elasticsearch:
  addrs: []
  item_index_prefix: ms_search_item
  request_timeout: 5s
  max_response_bytes: 4194304
  debug_enabled: true

recommend_debug:
  max_candidate_limit: 1000
  debug_enabled: true
  online_base_url: ""
  request_timeout: 5s
