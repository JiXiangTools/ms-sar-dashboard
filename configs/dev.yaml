app:
  name: ms-sar-dashboard
  env: dev
  host: 0.0.0.0
  port: 8081
  read_timeout: 5s
  write_timeout: 10s
  shutdown_timeout: 10s

auth:
  jwt_secret: ms-sar-dashboard-dev-secret
  access_token_ttl: 2h
  issuer: ms-sar-dashboard

sso:
  enabled: true
  admin_ui_url: "http://server.muguayun.top:8589/uc-admin"
  api_base_url: "http://server.muguayun.top:8589/"
  app_id: "100001"
  app_secret: "be15884351173848c685cc5d508a783b60ebe24c1b5205dc"
  redirect_url: "http://127.0.0.1:8081/sar-admin"
  request_timeout: 3s

log:
  level: info

database:
  dsn: postgres://postgres:postgres@127.0.0.1:5432/ms_sar_dashboard?sslmode=disable
  max_open_conns: 20
  max_idle_conns: 5
  conn_max_lifetime: 30m
  health_check_timeout: 2s

redis:
  mode: standalone
  addrs:
    - 127.0.0.1:6379
  key_prefix: ""
  db: 8
  dial_timeout: 2s
  read_timeout: 2s
  write_timeout: 2s
  health_check_timeout: 2s

elasticsearch:
  addrs:
    - http://127.0.0.1:9200
  username: ""
  password: ""
  item_index_prefix: ms_search_item
  request_timeout: 5s
  max_response_bytes: 4194304
  debug_enabled: true

recommend_debug:
  max_candidate_limit: 1000
  debug_enabled: true
  online_base_url: http://127.0.0.1:18082
  request_timeout: 5s
