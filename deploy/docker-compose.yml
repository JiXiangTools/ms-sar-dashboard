name: ms-sar-dashboard-offline

x-offline-env: &offline-env
  AROF_APP_ENV: "${AROF_APP_ENV}"
  AROF_DATA_DIR: "${AROF_DATA_DIR}"
  AROF_STATE_DIR: "${AROF_STATE_DIR}"
  AROF_LOG_DIR: "${AROF_LOG_DIR}"
  AROF_TIMEZONE: "${AROF_TIMEZONE}"
  TZ: "${TZ}"
  AROF_KAFKA_BOOTSTRAP_SERVERS: "${AROF_KAFKA_BOOTSTRAP_SERVERS}"
  AROF_PRODUCT_TOPIC: "${AROF_PRODUCT_TOPIC}"
  AROF_BEHAVIOR_TOPIC: "${AROF_BEHAVIOR_TOPIC}"
  AROF_REDIS_MODE: "${AROF_REDIS_MODE}"
  AROF_REDIS_URL: "${AROF_REDIS_URL}"
  AROF_REDIS_DB: "${AROF_REDIS_DB}"
  AROF_ES_URL: "${AROF_ES_URL}"
  AROF_APPID: "${AROF_APPID}"
  AROF_TOP_N: "${AROF_TOP_N}"
  AROF_MAX_ITEMS_PER_USER: "${AROF_MAX_ITEMS_PER_USER}"
  AROF_BATCH_SIZE: "${AROF_BATCH_SIZE}"
  AROF_FLUSH_INTERVAL_SECONDS: "${AROF_FLUSH_INTERVAL_SECONDS}"
  AROF_HOT_HOUR_LOOKBACK_HOURS: "${AROF_HOT_HOUR_LOOKBACK_HOURS}"
  AROF_HOT_TTL_SECONDS: "${AROF_HOT_TTL_SECONDS}"
  AROF_ICF_TTL_SECONDS: "${AROF_ICF_TTL_SECONDS}"
  AROF_ITEM_RELATE_TTL_SECONDS: "${AROF_ITEM_RELATE_TTL_SECONDS}"
  AROF_NEARLINE_TTL_SECONDS: "${AROF_NEARLINE_TTL_SECONDS}"
  AROF_NEARLINE_DISABLED_TTL_SECONDS: "${AROF_NEARLINE_DISABLED_TTL_SECONDS}"
  NO_PROXY: "${NO_PROXY}"
  no_proxy: "${no_proxy}"

x-offline-service: &offline-service
  image: "${ALG_REC_OFFLINE_IMAGE}"
  platform: "${DOCKER_PLATFORM}"
  restart: unless-stopped
  volumes:
    - "${OFFLINE_DATA_HOST_DIR}:/app/data"
    - "${OFFLINE_LOG_HOST_DIR}:/app/logs"

services:
  product-data-consumer:
    <<: *offline-service
    environment:
      <<: *offline-env
      AROF_PRODUCT_GROUP_ID: "${AROF_PRODUCT_GROUP_ID}"
    command: ["product-data-consumer"]

  user-behavior-consumer:
    <<: *offline-service
    environment:
      <<: *offline-env
      AROF_BEHAVIOR_GROUP_ID: "${AROF_BEHAVIOR_GROUP_ID}"
    command: ["user-behavior-consumer"]

  nearline:
    <<: *offline-service
    environment:
      <<: *offline-env
      AROF_NEARLINE_GROUP_ID: "${AROF_NEARLINE_GROUP_ID}"
    command: ["nearline"]

  rec-hot-cal:
    <<: *offline-service
    environment:
      <<: *offline-env
      AROF_HOT_PERIOD: hour
      RUN_INTERVAL_SECONDS: "${HOT_HOUR_INTERVAL_SECONDS}"
    command: ["rec-hot-cal"]

  rec-hot-cal-day:
    <<: *offline-service
    environment:
      <<: *offline-env
      AROF_HOT_PERIOD: day
      RUN_INTERVAL_SECONDS: "${HOT_DAY_INTERVAL_SECONDS}"
    command: ["rec-hot-cal"]

  rec-hot-cal-week:
    <<: *offline-service
    environment:
      <<: *offline-env
      AROF_HOT_PERIOD: week
      RUN_INTERVAL_SECONDS: "${HOT_WEEK_INTERVAL_SECONDS}"
    command: ["rec-hot-cal"]

  rec-icf:
    <<: *offline-service
    environment:
      <<: *offline-env
      RUN_INTERVAL_SECONDS: "${OFFLINE_CAL_INTERVAL_SECONDS}"
    command: ["rec-icf"]

  rec-item-relate:
    <<: *offline-service
    environment:
      <<: *offline-env
      RUN_INTERVAL_SECONDS: "${OFFLINE_CAL_INTERVAL_SECONDS}"
    command: ["rec-item-relate"]

  item-2-search:
    <<: *offline-service
    environment:
      <<: *offline-env
      RUN_INTERVAL_SECONDS: "${OFFLINE_CAL_INTERVAL_SECONDS}"
    command: ["item-2-search"]
