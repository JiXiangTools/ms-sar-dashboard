name: Docker Image

on:
  workflow_dispatch:

env:
  REGISTRY: dockerhub.seobot.cc
  IMAGE_REPOSITORY: dockerhub.seobot.cc/ms/sar-dashboard

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: meta
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          date_tag="$(date +%y%m%d)"
          image_tag="${date_tag}_${short_sha}"
          build_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          {
            echo "short_sha=${short_sha}"
            echo "image_tag=${image_tag}"
            echo "image_name=${IMAGE_REPOSITORY}:${image_tag}"
            echo "build_time=${build_time}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.CI_REGISTRY_USERNAME }}
          password: ${{ secrets.CI_REGISTRY_PASSWORD }}

      - name: Pull base images
        shell: bash
        run: |
          docker pull "${REGISTRY}/library/golang:1.26"
          docker pull "${REGISTRY}/library/alpine:3.21"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.image_name }}
          build-args: |
            COMMIT_ID=${{ steps.meta.outputs.short_sha }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
            GOPROXY=https://goproxy.cn,direct
            HTTP_PROXY=
            HTTPS_PROXY=
            ALL_PROXY=
            NO_PROXY=
            http_proxy=
            https_proxy=
            all_proxy=
            no_proxy=

      - name: Image summary
        shell: bash
        run: |
          echo "Pushed ${IMAGE_REPOSITORY}:${{ steps.meta.outputs.image_tag }}"
